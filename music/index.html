<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简律动音乐播放器</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>

    <div class="player-container">
        <div class="disc-wrapper">
            <div class="disc" id="disc"></div>
        </div>

        <div class="track-info">
            <h2 class="track-title">赛博晚霞 (Cyber Sunset)</h2>
            <p class="track-artist">Lo-Fi Chill Beats</p>
        </div>

        <div class="visualizer" id="visualizer">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <div class="controls">
            <button id="play-btn" class="btn">播放</button>
        </div>
    </div>

    <audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <script src="./index.js"></script>
</body>
</html>
